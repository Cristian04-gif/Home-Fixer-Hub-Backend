server:
  port: 8761 # puerto estandar de eureka
spring:
  application:
    name: eureka_server
eureka:
  instance:
    hostname: ${HOST_EUREKA:localhost}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
