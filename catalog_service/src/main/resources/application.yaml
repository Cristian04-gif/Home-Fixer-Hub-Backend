server:
  port: 8083
spring:
  application:
    name: catalog_service
  # Configuración de R2DBC para MySQL
  r2dbc:
    url: r2dbc:mysql://localhost:3306/home_fixer_hub
    username: root
    password: root
    pool:
      enabled: true
      initial-size: 5
      max-size: 10

  # Configuración del servidor WebFlux
  codec:
    max-in-memory-size: 10MB

# Opcional: Para ver las consultas SQL en consola
logging:
  level:
    org.springframework.r2dbc: DEBUG
